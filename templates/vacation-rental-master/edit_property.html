<!DOCTYPE html>
<html>
<head>
<title>Edit Property</title>
<style>
body{font-family:Arial}
.box{max-width:500px;margin:40px auto}
input,textarea{width:100%;padding:8px;margin:6px 0}
button{background:#ff5a5f;color:#fff;border:none;padding:8px 14px;border-radius:6px}
</style>
</head>
<body>

<div class="box">
<h2>Edit Property</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<input type="text" name="title" value="{{ prop.title }}" required>
<input type="number" name="price" value="{{ prop.price }}" required>
<textarea name="description">{{ prop.description }}</textarea>

<input type="file" name="image">

<button type="submit">Update Property</button>
</form>

<br>
<a href="{% url 'profile' %}">Back</a>
</div>

</body>
</html>
