{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - RentEase</title>

<!-- Font Awesome for social icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .login-container {
        background:white;
        padding:2rem;
        border-radius:10px;
        width:360px;
        box-shadow:0 4px 15px rgba(0,0,0,0.2);
    }

    h2 { text-align:center; margin-bottom:1rem; color:#333; }

    form input {
        width:100%;
        padding:0.75rem;
        margin:0.5rem 0;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:1rem;
    }

    button {
        width:100%;
        padding:0.75rem;
        border:none;
        border-radius:5px;
        background:#007BFF;
        color:white;
        font-size:1rem;
        cursor:pointer;
        margin-top:0.5rem;
    }

    button:hover { background:#0056b3; }

    .social-login { text-align:center; margin:1rem 0; }
    .social-login p { margin-bottom:0.5rem; font-weight:bold; }

    .social-btn {
        display:flex;
        align-items:center;
        justify-content:center;
        text-decoration:none;
        color:white;
        padding:0.5rem;
        border-radius:5px;
        margin:0.5rem 0;
        font-weight:bold;
    }

    .google-btn { background:#db4437; }
    .github-btn { background:#333; }
    .google-btn:hover { background:#c1351d; }
    .github-btn:hover { background:#000; }
    .social-btn i { margin-right:0.5rem; }

    .link { text-align:center; margin-top:1rem; }
    .error { color:red; text-align:center; margin-bottom:0.5rem; }
</style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <!-- Username/password login form -->
    <form method="POST" action="{% url 'login' %}">

        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="text" name="phone" required>

        <button type="submit">Login</button>
    </form>

    <!-- Social login buttons -->
    <div class="social-login">
        <p>— Or login with —</p>

        <a href="{% provider_login_url 'google' %}" class="social-btn google-btn">
            <i class="fa fa-google"></i> Login with Google
        </a>

        <a href="{% provider_login_url 'github' %}" class="social-btn github-btn">
            <i class="fa fa-github"></i> Login with GitHub
        </a>
    </div>

    <div class="link">
        New user? <a href="{% url 'signup' %}">Create Account</a>
    </div>
</div>

</body>
</html>
