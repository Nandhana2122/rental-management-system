<h2>Pay for {{ property.title }}</h2>
<p>Amount: ₹{{ property.price }}</p>

<form method="post">
{% csrf_token %}

<label>
<input type="radio" name="method" value="UPI" required> UPI
</label><br>

<label>
<input type="radio" name="method" value="Card"> Card
</label><br>

<label>
<input type="radio" name="method" value="NetBanking"> Net Banking
</label><br><br>

<button type="submit">Pay Now</button>
</form>
