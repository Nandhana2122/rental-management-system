<!DOCTYPE html>
<html>
<head>
    <title>Video Call</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Big screen (Customer video) */
        #remoteVideo {
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: black;
        }

        /* Small self preview */
        #localVideo {
            position: fixed;
            width: 300px;
            height: 200px;
            bottom: 90px;
            right: 25px;
            border-radius: 12px;
            border: 2px solid white;
            object-fit: cover;
            background: black;
        }

        /* Bottom Controls */
        .controls {
            position: fixed;
            bottom: 25px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .control-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            background: #2f2f2f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .control-btn:hover {
            background: #444;
        }

        .end-call {
            background: red;
            width: 70px;
            height: 70px;
            font-size: 24px;
        }

        .active-red {
            background: red !important;
        }

    </style>
</head>

<body>

<video id="remoteVideo" autoplay></video>
<video id="localVideo" autoplay muted></video>

<div class="controls">
    <button class="control-btn" id="micBtn" onclick="toggleMute()">🎤</button>
    <button class="control-btn end-call" onclick="endCall()">📞</button>
    <button class="control-btn" id="camBtn" onclick="toggleCamera()">📹</button>
</div>

<script>
let localStream;
let isMuted = false;
let isCameraOff = false;

async function startCall() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        });

        // Small screen = your video
        document.getElementById("localVideo").srcObject = localStream;

        // Big screen will show customer when real connection added

    } catch (error) {
        alert("Camera/Mic error: " + error);
    }
}

// Start camera automatically
startCall();

function toggleMute() {
    if (!localStream) return;

    localStream.getAudioTracks().forEach(track => {
        track.enabled = isMuted;
    });

    isMuted = !isMuted;
    document.getElementById("micBtn").classList.toggle("active-red");
}

function toggleCamera() {
    if (!localStream) return;

    localStream.getVideoTracks().forEach(track => {
        track.enabled = isCameraOff;
    });

    isCameraOff = !isCameraOff;
    document.getElementById("camBtn").classList.toggle("active-red");
}

function endCall() {
    if (!localStream) return;

    localStream.getTracks().forEach(track => track.stop());
    document.getElementById("localVideo").srcObject = null;
}
</script>

</body>


</html>
